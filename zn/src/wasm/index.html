<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova WASM Sovereignty</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard { border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .metric { font-size: 24px; margin: 10px 0; }
        .status { color: #888; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🦅 Nova WASM Bridge</h1>
        <p class="status">Status: <span id="sync-status">Awaiting Synchronization...</span></p>
        <div class="metric">CPU Usage: <span id="cpu-val">0.00%</span></div>
        <div class="metric">Memory Usage: <span id="mem-val">0.00%</span></div>
        <p><i>Mirror Protocol v2: 45,000x efficient state sync active.</i></p>
    </div>

    <script src="build/nova.js"></script>
    <script>
        async function initZenith() {
            const Module = await ZenithEngine();
            
            // Wrap C functions
            const initBridge = Module.cwrap('zenith_wasm_init_bridge', null, ['number']);
            const updateState = Module.cwrap('zenith_wasm_update_state', 'number', ['number']);
            
            // 1. Initialize for 8 metrics (matches ZenithSystemMetrics)
            initBridge(8);
            document.getElementById('sync-status').innerText = "Vortex Connected ✅";

            // 2. Simulated WebSocket receipt (In real app, this comes from socket)
            // This is a Nova Bridge Wire Buffer (simulated)
            function onMessage(blob) {
                const ptr = Module._malloc(blob.length);
                Module.HEAPU8.set(blob, ptr);
                
                const statePtr = updateState(ptr);
                const state = new Float32Array(Module.HEAPF32.buffer, statePtr, 8);
                
                // Update UI from native WASM state
                document.getElementById('cpu-val').innerText = (state[0] * 100).toFixed(2) + "%";
                document.getElementById('mem-val').innerText = (state[1] * 100).toFixed(2) + "%";
                
                Module._free(ptr);
            }

            console.log("Nova WASM Sovereignty Engine Online.");
        }

        initZenith();
    </script>
</body>
</html>
